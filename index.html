<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Currency Calculator</title>
    <link rel="stylesheet" href="style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,opsz,wght@0,6..96,400..900;1,6..96,400..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet" />

    <!-- Remix icon -->
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.5.0/fonts/remixicon.css" rel="stylesheet" />
</head>

<body>
    <div class="container">
        <div class="box">
            <h2>Currency Calculator</h2>
            <p class="amount">Enter Amount</p>
            <input class="inp" type="tel">
            <br>
            <div class="drop-list">
                <div class="from">
                    <p class="n1">From</p>
                    <div class="select-box">
                        <img src="https://flagsapi.com/US/flat/64.png" alt="flag">
                        <select id="fromCurrency"></select>
                    </div>
                </div>
                <div class="exchange">
                    <button onclick="swapCurrencies()"><i class="ri-arrow-left-right-line"></i></button>
                </div>
                <div class="to">
                    <p class="n2">To</p>
                    <div class="select-box">
                        <img src="https://flagsapi.com/IN/flat/64.png" alt="flag">
                        <select id="toCurrency"></select>
                    </div>
                </div>
            </div>
            <div id="reslut-box">
            <h3 class="result-amount"></h3>
            </div>
            <button class="btn" type="submit" value="Calculate Age" onclick="convertCurrency()">Convert</button>
        </div>
    </div>


    <script src="index.js" type="module"></script>
    <script src="country-list.js"></script>
</body>

</html>
